# Dual-head PPO configuration for bimanual pouring (rl_games).
#
# This configuration uses separate encoders for left and right arms,
# allowing rollout of pre-trained grasp policies (2g_grasp_left_v1, 2g_grasp_right_v1)
# without distribution shift conflicts.
#
# Key parameters:
# - dof_split_index: 8 (left arm actions [0:8], right arm actions [8:])
# - obs_split_index: 40 (left obs [0:40], right obs [40:])
# - separate_encoders: True (each arm has its own encoder)

params:
  seed: 42

  # environment wrapper clipping
  env:
    clip_observations: 100.0
    clip_actions: 100.0

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  network:
    name: dualhead_a2c
    separate: True
    space:
      continuous:
        mu_activation: None
        sigma_activation: None

        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: True

    # Dual-head specific parameters
    dof_split_index: 8
    obs_split_index: 40
    separate_encoders: true
    separate_noise_std: true
    dual_critic: true

    mlp:
      units: [256, 128, 64]
      activation: elu
      d2rl: False

      initializer:
        name: default
      regularizer:
        name: None

  load_checkpoint: False
  load_path: ''

  config:
    name: pipeline/both/2g_pouring_v1_dualhead
    env_name: rlgpu
    device: 'cuda:0'
    device_name: 'cuda:0'
    multi_gpu: False
    ppo: True
    mixed_precision: False
    normalize_input: True
    normalize_value: True
    value_bootstrap: True
    num_actors: -1
    reward_shaper:
      scale_value: 1.0
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    learning_rate: 5e-4
    lr_schedule: adaptive
    schedule_type: legacy
    kl_threshold: 0.01
    score_to_win: 5.0
    max_epochs: 10000
    save_best_after: 200
    save_frequency: 100
    print_stats: True
    grad_norm: 1.0
    entropy_coef: 0.01
    truncate_grads: True
    e_clip: 0.2
    horizon_length: 24
    minibatch_size: 24576
    mini_epochs: 5
    critic_coef: 2
    clip_value: True
    clip_actions: False
    bounds_loss_coef: 0.0001
