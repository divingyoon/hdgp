# 5g_grasp_right_v4 rl_games PPO 설정
# Symmetric Actor-Critic (DEXTRAH Teacher 방식):
#   actor = critic = 152D (fabric_q/qd 포함, Fabrics는 real에서도 실행)
# separate: False → 공유 backbone MLP [512,512,256,128]
# gamma: 0.99 (delta 보상 방식에 적합)

params:
  seed: 42

  env:
    clip_observations: 5.0
    clip_actions: 1.0

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  network:
    name: actor_critic
    separate: False         # actor = critic = 동일 152D obs, 공유 backbone
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: True
    mlp:
      units: [512, 512, 256, 128]  # DEXTRAH FF (Kuka-Allegro) 기준
      activation: elu
      d2rl: False
      initializer:
        name: default
      regularizer:
        name: None

  load_checkpoint: False
  load_path: ''

  config:
    name: 5g_grasp_right_v4
    env_name: rlgpu
    device: 'cuda:0'
    device_name: 'cuda:0'
    multi_gpu: False
    ppo: True
    mixed_precision: False
    normalize_input: True
    normalize_value: True
    value_bootstrap: True
    num_actors: -1
    reward_shaper:
      scale_value: 0.01
    normalize_advantage: True
    # delta 보상 방식: gamma 낮추어 단기 보상 중시 (approach delta, diff_contacts)
    gamma: 0.99
    tau: 0.95
    learning_rate: 3e-4
    lr_schedule: adaptive
    schedule_type: legacy
    kl_threshold: 0.01
    score_to_win: 100000000
    max_epochs: 20000
    save_best_after: 100
    save_frequency: 50
    print_stats: True
    grad_norm: 1.0
    entropy_coef: 0.001
    truncate_grads: True
    e_clip: 0.2
    horizon_length: 16     # 2048 envs × 16 = 32768 samples/iter
    minibatch_size: 16384  # 32768 / 2
    mini_epochs: 5   # DEXTRAH FF 기준 (LSTM=4, FF=5)
    critic_coef: 4
    clip_value: True
    clip_actions: False
    seq_len: 4
    bounds_loss_coef: 0.0001
