# 5g_grasp_right_v2 rl_games PPO (DemoGrasp-like) 설정
# 목적: DemoGrasp PPOOneStep 경향을 rl_games 범위 내에서 근사
# 참고: 완전 동일 재현은 아님 (ppo_onestep 고유 update 루프 차이 존재)

params:
  seed: 42

  env:
    clip_observations: 5.0
    clip_actions: 1.0

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: True
    mlp:
      # DemoGrasp policy/vf hid sizes와 유사한 대형 MLP
      units: [1024, 1024, 512, 512]
      activation: elu
      d2rl: False
      initializer:
        name: default
      regularizer:
        name: None

  load_checkpoint: False
  load_path: ''

  config:
    name: 5g_grasp_right_v2_demograsp_like
    env_name: rlgpu
    device: 'cuda:0'
    device_name: 'cuda:0'
    multi_gpu: False
    ppo: True
    mixed_precision: False
    normalize_input: True
    normalize_value: True
    value_bootstrap: True
    num_actors: -1
    reward_shaper:
      # DemoGrasp는 별도 reward scaling을 강하게 두지 않음
      scale_value: 1.0
    normalize_advantage: True

    # DemoGrasp 근사 hyper-params
    gamma: 0.96
    tau: 0.95
    learning_rate: 3e-4
    lr_schedule: adaptive
    schedule_type: legacy
    kl_threshold: 0.016
    entropy_coef: 0.0
    e_clip: 0.2
    mini_epochs: 5
    critic_coef: 2.0

    # PPOOneStep(nsteps=1) 근사: 짧은 rollout
    horizon_length: 1
    # total batch = num_envs * horizon_length. 기본 2048 env에서 full-batch 업데이트.
    minibatch_size: 2048

    score_to_win: 100000000
    max_epochs: 20000
    save_best_after: 100
    save_frequency: 50
    print_stats: True
    grad_norm: 1.0
    truncate_grads: True
    clip_value: True
    clip_actions: False
    seq_len: 1
    bounds_loss_coef: 0.0001
